name: Secret Leak Scan

on:
  push:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "25 1 * * *"

permissions:
  contents: read

jobs:
  scan-repo:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Scan current files
        run: python3 scripts/security/scan_secrets.py --mode repo

      - name: Scan git history
        run: python3 scripts/security/scan_secrets.py --mode history
